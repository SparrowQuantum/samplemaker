name: Fault
description: Report a bug or unexpected behavior
title: "Fault: "
labels: ["fault", "needs-triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before filing
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: what
    attributes:
      label: What is broken?
      description: Which tool, system, or process is affected?
      placeholder: "e.g. The data export stops partway through and shows an error"
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      description: Did this work correctly before?
      options:
        - "Unknown"
        - "Yes - it worked before"
        - "No - it has never worked"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Where did this happen?
      placeholder: |
        - Computer / OS:
        - Software version:
        - Equipment:
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: What were you doing when it happened?
      description: Step by step if possible.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "e.g. The export completed and a file appeared in the output folder"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: "e.g. The program showed an error message and closed"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error messages (if any)
      description: Copy and paste any error text here.
      render: shell
    validations:
      required: false
